{% load static %}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ссылка отправлена — Glow Up</title>
  <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
  <main class="auth">
    <section class="auth-card">
      <h1 class="auth-title">Проверьте сообщения</h1>
      <p class="auth-subtitle">
        Если аккаунт существует, мы отправили ссылку для смены пароля на: <b>{{ contact }}</b>.
      </p>
      <div class="auth-footer">
        <a class="auth-link" href="{% url 'login' %}">← Ко входу</a>
      </div>
    </section>
  </main>
</body>
</html>
