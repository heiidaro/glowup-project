{% load static %}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Восстановление пароля — Glow Up</title>
  <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
  <main class="auth">
    <section class="auth-card">
      <h1 class="auth-title">Восстановление пароля</h1>
      <p class="auth-subtitle">Введите email или телефон — мы отправим ссылку для смены пароля.</p>

      <form method="post" class="auth-form">
        {% csrf_token %}

        {% if form.non_field_errors %}
          <div class="auth-error">{{ form.non_field_errors }}</div>
        {% endif %}

        <label class="auth-field">
          <span>Email или телефон</span>
          {{ form.contact }}
          {% if form.contact.errors %}<small class="auth-field-error">{{ form.contact.errors }}</small>{% endif %}
        </label>

        <button class="auth-btn" type="submit">Отправить ссылку</button>
      </form>

      <div class="auth-footer">
        <a class="auth-link" href="{% url 'login' %}">← Вернуться ко входу</a>
      </div>
    </section>
  </main>
</body>
</html>
