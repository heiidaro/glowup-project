{% load static %}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Подтверждение — Glow Up</title>
  <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
  <main class="auth">
    <section class="auth-card">
      <h1 class="auth-title">Подтвердите {% if channel == "email" %}email{% else %}номер телефона{% endif %}</h1>
      <p class="auth-subtitle">Мы отправили код на: <b>{{ contact }}</b></p>

      <form method="post" class="auth-form">
        {% csrf_token %}
        <label class="auth-field">
          <span>Код (6 цифр)</span>
          {{ form.code }}
          {% if form.code.errors %}<small class="auth-field-error">{{ form.code.errors }}</small>{% endif %}
        </label>
        <button class="auth-btn" type="submit">Подтвердить</button>
      </form>

      <div class="auth-footer">
        <a class="auth-link" href="{% url 'resend_code' %}?pid={{ pid }}">Отправить код ещё раз</a>
      </div>

      <div class="auth-back">
        <a class="auth-link" href="{% url 'register' %}">← Назад</a>
      </div>
    </section>
  </main>
</body>
</html>
