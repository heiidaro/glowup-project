{% load static %}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Смена пароля — Glow Up</title>
  <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
  <main class="auth">
    <section class="auth-card">
      <h1 class="auth-title">Смена пароля</h1>

      <form method="post" class="auth-form">
        {% csrf_token %}

        {% if form.non_field_errors %}
          <div class="auth-error">{{ form.non_field_errors }}</div>
        {% endif %}

        <label class="auth-field">
          <span>Новый пароль</span>
          {{ form.password1 }}
          {% if form.password1.errors %}<small class="auth-field-error">{{ form.password1.errors }}</small>{% endif %}
        </label>

        <label class="auth-field">
          <span>Повтор пароля</span>
          {{ form.password2 }}
          {% if form.password2.errors %}<small class="auth-field-error">{{ form.password2.errors }}</small>{% endif %}
        </label>

        <button class="auth-btn" type="submit">Сохранить пароль</button>
      </form>
    </section>
  </main>
</body>
</html>
