{% load static %}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Вход — Glow Up</title>
  <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
  <main class="auth">
    <section class="auth-card">
      <h1 class="auth-title">Вход</h1>
      <p class="auth-subtitle">Введите email или телефон и пароль.</p>

      <form method="post" class="auth-form">
        {% csrf_token %}

        {% if form.non_field_errors %}
          <div class="auth-error">
            {{ form.non_field_errors }}
          </div>
        {% endif %}

        <label class="auth-field">
          <span>Email или телефон</span>
          {{ form.contact }}
          {% if form.contact.errors %}<small class="auth-field-error">{{ form.contact.errors }}</small>{% endif %}
        </label>

        <label class="auth-field">
          <span>Пароль</span>
          {{ form.password }}
          {% if form.password.errors %}<small class="auth-field-error">{{ form.password.errors }}</small>{% endif %}
        </label>

        <button class="auth-btn" type="submit">Войти</button>
      </form>

      <div class="auth-footer">
        <a class="auth-link" href="{% url 'password_reset' %}">Забыли пароль? Восстановить</a>
      </div>

      <div class="auth-footer">
        <span>Нет аккаунта?</span>
        <a class="auth-link" href="{% url 'register' %}">Зарегистрироваться</a>
      </div>

      <div class="auth-back">
        <a class="auth-link" href="{% url 'home' %}">← На главную</a>
      </div>
    </section>
  </main>
</body>
</html>
